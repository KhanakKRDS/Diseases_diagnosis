<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/jpeg" href="/static/x-ray-favicon.jpg">
</head>

<style>
      body{
            background-color: rgb(220, 247, 255);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: rgb(12, 83, 189);
        }

        .navbar { /*side nvigation bar*/
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1; /*stay on top*/
            top: 0;
            left: 0;
            background-color: rgb(180, 221, 255);
            overflow-x: hidden; /*disable horiontal scroll*/
            padding-top: 60px;
            transition: 0.5s;
        }

        .navbar a { /*navbar links*/
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 25px;
            color: rgb(20, 9, 121);
            display: block;
            transition: 0.3s;
        }

        .navbar a:hover { /*when the mouse is on links, change color*/
            color: rgb(243, 241, 241);
        }

        .navbar .closeButton {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }
        

        #main { /*moving the info when navbar is open (ID selector)*/
            transition: margin-left .5s;
            padding: 20px;
            font-size: 30px;
            color: #000000;
        }

        @media screen and (max-height: 450px) {
            .navbar {padding-top: 15px;}

            .navbar a {font-size: 18px;}
        }

        #pneumonia_info{
            text-align: center;
        }
</style>

<body>
    <span style="font-size: 40px; margin-left: 30px; cursor:pointer " onclick="openNav()">&#9776;</span>

    <div id="sideNavbar" class="navbar">
            <a href="javascript:void(0)" class="closeButton" onclick="closeNav()"> &times; </a>
            <a href="website.html"> Home </a>
            <a href="info.html"> Information </a>
            <a href="website.html"> Diet </a>
    </div>

    <span onclick="openNav()"></span>

    <div id="pneumonia_info" class=" p_info">
        <h1> Pneumonia</h1>
    </div>

    <script>
           function openNav() {
            document.getElementById("sideNavbar").style.width = "250px";
        }
        function closeNav() {
            document.getElementById("sideNavbar").style.width = "0";
        }
    </script>
</body>


</html>
