<!DOCTYPE html>
<html>

<head>

    <link rel="icon" type="image/jpeg" href="/static/x-ray-favicon.jpg">

    <style>
        body {

            background-color: rgb(232, 250, 255);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: rgb(12, 83, 189);
        }

        .image-preview {
            max-width: 300px;
            margin-top: 20px;
            display: none;
        }

        .navbar {
            /*side nvigation bar*/
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1;
            /*stay on top*/
            top: 0;
            left: 0;
            background-color: rgb(180, 221, 255);
            overflow-x: hidden;
            /*disable horiontal scroll*/
            padding-top: 60px;
            transition: 0.5s;
        }

        .navbar a {
            /*navbar links*/
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 25px;
            color: rgb(20, 9, 121);
            display: block;
            transition: 0.3s;
        }

        .navbar a:hover {
            /*when the mouse is on links, change color*/
            color: rgb(243, 241, 241);
        }

        .navbar .closeButton {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        #main {
            /*moving the info when navbar is open (ID selector)*/
            transition: margin-left .5s;
            padding: 20px;
            font-size: 30px;
            color: #000000;
        }

        h1 {
            /*(class selector)*/
            display: block;
            margin: auto;
            width: 50%;

        }

        input {
            font-size: 15px;
            color: #040404;
        }

        #predictButton {
            position: relative;
            left: 20px;
        }

        @media screen and (max-height: 450px) {
            .navbar {
                padding-top: 15px;
            }

            .navbar a {
                font-size: 18px;
            }
        }

        .image-preview {
            padding-left: 50px;
        }

        .resultText.textContent {
            margin-left: 50px;
            font-size: 30px;
        }

        label {
            color: rgb(66, 167, 250);
            text-align: center;
            font-size: 40px;
        }

        #main{
            display:flex;
            justify-content: center; /*in middle horizontally*/
            align-items: center;/*in middle vertically*/
            width: 100%; 
        }
        #imagePreview{
            display:flex;
            justify-content: center; /*in middle horizontally*/
            align-items: center;/*in middle vertically*/
            width: 100%; 
        }
        #choose{
            display:flex;
            justify-content: center; /*in middle horizontally*/
            align-items: center;/*in middle vertically*/
            width: 100%; 
        }
        #predict{
            display:flex;
            flex-direction: column;
            align-items: center;/*in middle vertically*/
            padding-top: 10px;
        }

        #result{
            font-size: 30px;
        }

    </style>
</head>

<body>
    <span style="font-size: 60px; margin-left: 30px; cursor:pointer " onclick="openNav()">&#9776;</span>

    <div id="sideNavbar" class="navbar">
        <a href="javascript:void(0)" class="closeButton" onclick="closeNav()"> &times; </a>
        <a href="website.html"> Home </a>
        <a href="info.html"> Information </a>
        <a href="diet.html"> Diet </a>
    </div>

    <span onclick="openNav()"></span>

     <!-- <h1> AI X-rayScan </h1>-->
     <h1><img src="/static/title_crop.png" alt="Description of image" class="heading-image"></h1>
     
    <div id="class_container">
        <div id="main">

            <label for="x_ray">Upload an X-ray image</label>
        </div>

        <div id="choose">
            <!-- image/* = JPEG, PNG, GIF, WebP -->
            <input type="file" id="x_ray" name="x_ray" accept="image/*">   
        </div>

        <!-- able to preview the uploaded image -->
        <div id="imagePreview">
            <img src="#" alt="Image Preview" class="image-preview">
            <br>
        </div>

        <div id="predict">
            <input type="button" id="predictButton" value="Predict">
            <!-- (x will be changed)submit button to send the image to the backend -->
            <br>
            <p id="result"></p>
            <p id="note"></p>
        </div>
    </div>

    <script>

        function openNav() {
            document.getElementById("sideNavbar").style.width = "250px";
        }
        function closeNav() {
            document.getElementById("sideNavbar").style.width = "0";
        }

        const fileInput = document.getElementById('x_ray'); //selecting file input
        const previewImage = document.querySelector('.image-preview'); //selecting image for preview
        const predictButton = document.getElementById('predictButton'); //selecting predict button
        const resultText = document.getElementById('result');//selecting result paragraph

        fileInput.addEventListener('change', function (event) {
            const file = event.target.files[0]; //get the first file

            if (file) {
                previewImage.src = URL.createObjectURL(event.target.files[0]);
                previewImage.style.display = 'block'; // make the image visible
                previewImage.onload = function () {
                    URL.revokeObjectURL(previewImage.src)
                }
            }
        });

        //function to handle when predict button is clicked
        predictButton.addEventListener('click', async function () {
            const file = fileInput.files[0];

            //check if a file is selected
            if (!file) {
                alert("Please upload an image first.");
                return;
            }

            //call the function to send the image to backend
            const formData = new FormData();
            formData.append('file', file);

            resultText.textContent = "Predicting..."; //show predicting message

            //send the image to backend using fetch API
            try {
                const response = await fetch('http://127.0.0.1:8000/predict/', {
                    method: 'POST',
                    body: formData
                });

                //check if the response is ok
                const data = await response.json();
                resultText.textContent = "Prediction: " + data.prediction;
                document.getElementById("note").textContent = "Note: This is diagnosed using an AI. This is not made to replace Doctors." ;

                //catch any errors
            } catch (error) {
                console.error('Error:', error);
                resultText.textContent = "An error occurred during prediction.";
            }
        });
    </script>

</body>

</html>
